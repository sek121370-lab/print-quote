<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인쇄소 견적서 시스템</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
      color: white;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.4rem; letter-spacing: 1px; }
    header span { font-size: 0.85rem; opacity: 0.8; }

    /* ── Layout ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 16px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .card-header {
      background: #2b6cb0;
      color: white;
      padding: 14px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-body { padding: 20px; }

    /* ── Form Controls ── */
    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 7px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #2d3748;
      transition: border 0.2s, box-shadow 0.2s;
      background: #fff;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2b6cb0;
      box-shadow: 0 0 0 3px rgba(43,108,176,0.15);
    }
    textarea { resize: vertical; min-height: 70px; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    /* ── Item Table ── */
    .item-table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead th {
      background: #ebf4ff;
      color: #2b6cb0;
      font-weight: 700;
      padding: 10px 8px;
      text-align: center;
      border-bottom: 2px solid #bee3f8;
      white-space: nowrap;
    }
    tbody td {
      padding: 8px 6px;
      border-bottom: 1px solid #e2e8f0;
      text-align: center;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f7fafc; }

    .td-input {
      padding: 5px 6px;
      border: 1px solid #cbd5e0;
      border-radius: 5px;
      text-align: right;
      font-size: 0.85rem;
      width: 100%;
    }
    .td-input:focus {
      outline: none;
      border-color: #2b6cb0;
    }

    .btn-del {
      background: #fc8181;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: background 0.2s;
    }
    .btn-del:hover { background: #e53e3e; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    button {
      padding: 9px 18px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.88rem;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: #2b6cb0; color: white; }
    .btn-primary:hover { background: #1a365d; }
    .btn-success { background: #38a169; color: white; }
    .btn-success:hover { background: #276749; }
    .btn-warning { background: #dd6b20; color: white; }
    .btn-warning:hover { background: #9c4221; }
    .btn-outline {
      background: white;
      color: #2b6cb0;
      border: 2px solid #2b6cb0;
    }
    .btn-outline:hover { background: #ebf4ff; }

    /* ── Summary ── */
    .summary-box {
      background: #ebf4ff;
      border: 2px solid #bee3f8;
      border-radius: 10px;
      padding: 16px;
      margin-top: 16px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 0.9rem;
      border-bottom: 1px dashed #bee3f8;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row.total {
      font-size: 1.1rem;
      font-weight: 700;
      color: #2b6cb0;
      padding-top: 10px;
    }

    /* ── Quote Preview ── */
    #preview-section { display: none; }
    .quote-paper {
      background: white;
      padding: 40px 48px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .quote-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 3px solid #2b6cb0;
      padding-bottom: 20px;
      margin-bottom: 24px;
    }
    .quote-title {
      font-size: 2rem;
      font-weight: 800;
      color: #1a365d;
      letter-spacing: 4px;
    }
    .quote-no { font-size: 0.85rem; color: #718096; text-align: right; }
    .quote-parties {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    .party-box {
      background: #f7fafc;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.88rem;
    }
    .party-box h4 {
      color: #2b6cb0;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .party-box p { margin: 3px 0; color: #4a5568; }
    .party-box strong { color: #2d3748; }

    .quote-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.88rem; }
    .quote-table th {
      background: #1a365d;
      color: white;
      padding: 10px 12px;
      text-align: center;
      font-weight: 600;
    }
    .quote-table td {
      padding: 9px 12px;
      border-bottom: 1px solid #e2e8f0;
      text-align: center;
    }
    .quote-table tr:nth-child(even) td { background: #f7fafc; }
    .quote-table td:nth-child(2) { text-align: left; }

    .quote-totals { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .totals-box {
      min-width: 280px;
      background: #f7fafc;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.9rem;
    }
    .totals-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px dashed #e2e8f0;
    }
    .totals-row.grand {
      font-size: 1.05rem;
      font-weight: 700;
      color: #2b6cb0;
      border-bottom: none;
      padding-top: 8px;
    }

    .quote-notes {
      background: #fffaf0;
      border-left: 4px solid #ed8936;
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 20px;
    }
    .quote-footer {
      border-top: 2px solid #e2e8f0;
      padding-top: 16px;
      font-size: 0.82rem;
      color: #718096;
      text-align: center;
    }

    .seal-box {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
    }
    .seal {
      text-align: right;
      font-size: 0.88rem;
    }
    .seal p { margin: 3px 0; color: #4a5568; }
    .seal .stamp {
      display: inline-block;
      margin-top: 8px;
      width: 64px;
      height: 64px;
      border: 3px solid #e53e3e;
      border-radius: 50%;
      color: #e53e3e;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
    }

    /* ── Discount field ── */
    .discount-row { display: flex; align-items: center; gap: 8px; }
    .discount-row input { flex: 1; }
    .discount-row span { font-size: 0.85rem; color: #4a5568; white-space: nowrap; }

    /* ── Tag ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge-blue { background: #bee3f8; color: #2b6cb0; }

    @media print {
      body { background: white; }
      .no-print { display: none !important; }
      #preview-section { display: block !important; }
      .quote-paper { box-shadow: none; padding: 20px; }
      header, .form-section { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>🖨️ 인쇄소 견적서 시스템</h1>
  <span>Professional Print Quotation</span>
</header>

<div class="container">

  <!-- ── FORM SECTION ── -->
  <div id="form-section">

    <div class="grid" style="margin-bottom:24px">

      <!-- 고객 정보 -->
      <div class="card">
        <div class="card-header">👤 고객 정보</div>
        <div class="card-body">
          <div class="row2">
            <div class="form-group">
              <label>회사명 / 고객명 *</label>
              <input type="text" id="client-name" placeholder="(주)홍길동 / 홍길동" />
            </div>
            <div class="form-group">
              <label>담당자명</label>
              <input type="text" id="client-contact" placeholder="담당자 성함" />
            </div>
          </div>
          <div class="row2">
            <div class="form-group">
              <label>연락처</label>
              <input type="text" id="client-phone" placeholder="010-0000-0000" />
            </div>
            <div class="form-group">
              <label>이메일</label>
              <input type="email" id="client-email" placeholder="example@email.com" />
            </div>
          </div>
          <div class="form-group">
            <label>주소</label>
            <input type="text" id="client-address" placeholder="고객 주소" />
          </div>
        </div>
      </div>

      <!-- 인쇄소 정보 -->
      <div class="card">
        <div class="card-header">🏢 인쇄소 정보</div>
        <div class="card-body">
          <div class="row2">
            <div class="form-group">
              <label>인쇄소명 *</label>
              <input type="text" id="shop-name" placeholder="○○ 인쇄소" value="소소 인쇄소" />
            </div>
            <div class="form-group">
              <label>사업자번호</label>
              <input type="text" id="shop-biz" placeholder="000-00-00000" />
            </div>
          </div>
          <div class="row2">
            <div class="form-group">
              <label>전화번호</label>
              <input type="text" id="shop-phone" placeholder="02-0000-0000" />
            </div>
            <div class="form-group">
              <label>팩스</label>
              <input type="text" id="shop-fax" placeholder="02-0000-0001" />
            </div>
          </div>
          <div class="form-group">
            <label>주소</label>
            <input type="text" id="shop-address" placeholder="인쇄소 주소" />
          </div>
        </div>
      </div>
    </div>

    <!-- 견적 기본 정보 -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-header">📋 견적 기본 정보</div>
      <div class="card-body">
        <div class="row3">
          <div class="form-group">
            <label>견적 번호</label>
            <input type="text" id="quote-no" placeholder="자동 생성" readonly style="background:#f7fafc" />
          </div>
          <div class="form-group">
            <label>견적 날짜 *</label>
            <input type="date" id="quote-date" />
          </div>
          <div class="form-group">
            <label>유효 기간</label>
            <input type="date" id="quote-expiry" />
          </div>
        </div>
        <div class="row2">
          <div class="form-group">
            <label>납기 예정일</label>
            <input type="date" id="delivery-date" />
          </div>
          <div class="form-group">
            <label>결제 조건</label>
            <select id="payment-term">
              <option value="현금">현금</option>
              <option value="계좌이체">계좌이체</option>
              <option value="30일 후 결제">30일 후 결제</option>
              <option value="선불 50% / 완료 후 50%">선불 50% / 완료 후 50%</option>
              <option value="완료 후 청구">완료 후 청구</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- 견적 항목 -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-header">📦 인쇄 항목</div>
      <div class="card-body">
        <div class="item-table-wrap">
          <table id="items-table">
            <thead>
              <tr>
                <th style="width:36px">No.</th>
                <th style="min-width:160px">인쇄 품목</th>
                <th style="min-width:120px">규격 / 사양</th>
                <th style="min-width:80px">용지</th>
                <th style="min-width:70px">도수</th>
                <th style="min-width:80px">수량</th>
                <th style="min-width:100px">단가 (원)</th>
                <th style="min-width:110px">금액 (원)</th>
                <th style="width:60px">삭제</th>
              </tr>
            </thead>
            <tbody id="items-body">
              <!-- rows added by JS -->
            </tbody>
          </table>
        </div>

        <div class="btn-row" style="margin-top:14px">
          <button class="btn-outline" onclick="addRow()">＋ 항목 추가</button>
          <button class="btn-outline" onclick="addPreset('명함')">명함</button>
          <button class="btn-outline" onclick="addPreset('전단지')">전단지</button>
          <button class="btn-outline" onclick="addPreset('브로슈어')">브로슈어</button>
          <button class="btn-outline" onclick="addPreset('봉투')">봉투</button>
          <button class="btn-outline" onclick="addPreset('롤업배너')">롤업배너</button>
          <button class="btn-outline" onclick="addPreset('스티커')">스티커</button>
        </div>

        <!-- 할인 / 요약 -->
        <div class="summary-box">
          <div class="summary-row">
            <span>공급가액 소계</span>
            <strong id="sum-subtotal">0 원</strong>
          </div>
          <div class="summary-row">
            <span>할인</span>
            <div class="discount-row">
              <input type="number" id="discount" value="0" min="0" style="width:90px;text-align:right" oninput="calcTotal()" />
              <span>원</span>
            </div>
          </div>
          <div class="summary-row">
            <span>부가세 (VAT 10%)</span>
            <strong id="sum-vat">0 원</strong>
          </div>
          <div class="summary-row total">
            <span>합계 금액</span>
            <strong id="sum-total">0 원</strong>
          </div>
        </div>
      </div>
    </div>

    <!-- 비고 / 특이사항 -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-header">📝 비고 및 특이사항</div>
      <div class="card-body">
        <div class="form-group">
          <label>특이사항 / 요청사항</label>
          <textarea id="notes" rows="4" placeholder="예) 후가공: 코팅(유광/무광), 박, 형압 등&#10;색상 프로파일: CMYK&#10;교정지 필요 여부&#10;기타 고객 요청사항"></textarea>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="btn-row no-print" style="justify-content:center">
      <button class="btn-primary" onclick="generatePreview()">🔍 견적서 미리보기</button>
      <button class="btn-success" onclick="printQuote()">🖨️ 인쇄 / PDF 저장</button>
      <button class="btn-warning" onclick="resetForm()">🔄 초기화</button>
    </div>

  </div><!-- /form-section -->

  <!-- ── PREVIEW SECTION ── -->
  <div id="preview-section" style="margin-top:24px">
    <div class="btn-row no-print" style="margin-bottom:16px; justify-content:center">
      <button class="btn-outline" onclick="hidePreview()">← 수정하러 돌아가기</button>
      <button class="btn-success" onclick="printQuote()">🖨️ 인쇄 / PDF 저장</button>
    </div>

    <div class="quote-paper" id="quote-paper">
      <!-- filled by JS -->
    </div>
  </div>

</div><!-- /container -->

<script>
  // ── State ──
  let rows = [];
  let rowId = 0;

  // ── Presets ──
  const presets = {
    '명함': { spec: '90×50mm', paper: '아트지 350g', color: '4도(양면)', qty: 1000, unit: 15000 },
    '전단지': { spec: 'A4 (210×297mm)', paper: '아트지 130g', color: '4도(단면)', qty: 1000, unit: 45000 },
    '브로슈어': { spec: 'A4 접지', paper: '아트지 200g', color: '4도(양면)', qty: 500, unit: 180000 },
    '봉투': { spec: '229×162mm (C5)', paper: '화이트지 120g', color: '1도', qty: 500, unit: 120000 },
    '롤업배너': { spec: '850×2000mm', paper: '배너원단', color: '4도', qty: 1, unit: 55000 },
    '스티커': { spec: 'A4 사이즈', paper: '모조지 스티커', color: '4도', qty: 100, unit: 8000 },
  };

  // ── Init ──
  window.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    const fmt = d => d.toISOString().split('T')[0];
    document.getElementById('quote-date').value = fmt(today);
    const exp = new Date(today); exp.setDate(exp.getDate() + 14);
    document.getElementById('quote-expiry').value = fmt(exp);
    const del = new Date(today); del.setDate(del.getDate() + 7);
    document.getElementById('delivery-date').value = fmt(del);
    document.getElementById('quote-no').value = 'Q-' + today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0') + '-' + String(Math.floor(Math.random()*900)+100);
    addRow();
  });

  // ── Row management ──
  function addRow(preset) {
    const id = ++rowId;
    const p = preset ? presets[preset] : {};
    rows.push({ id, name: p.name||preset||'', spec: p.spec||'', paper: p.paper||'', color: p.color||'', qty: p.qty||1, unit: p.unit||0 });
    renderTable();
  }

  function addPreset(name) { addRow(name); }

  function deleteRow(id) {
    rows = rows.filter(r => r.id !== id);
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById('items-body');
    tbody.innerHTML = '';
    rows.forEach((r, i) => {
      const amount = (r.qty || 0) * (r.unit || 0);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i+1}</td>
        <td><input class="td-input" style="text-align:left" value="${r.name}" oninput="updateRow(${r.id},'name',this.value)" placeholder="품목명" /></td>
        <td><input class="td-input" style="text-align:left;font-size:0.78rem" value="${r.spec}" oninput="updateRow(${r.id},'spec',this.value)" placeholder="규격" /></td>
        <td><input class="td-input" style="text-align:left;font-size:0.78rem" value="${r.paper}" oninput="updateRow(${r.id},'paper',this.value)" placeholder="용지" /></td>
        <td><input class="td-input" style="text-align:center" value="${r.color}" oninput="updateRow(${r.id},'color',this.value)" placeholder="도수" /></td>
        <td><input class="td-input" type="number" min="1" value="${r.qty}" oninput="updateRow(${r.id},'qty',this.value)" /></td>
        <td><input class="td-input" type="number" min="0" value="${r.unit}" oninput="updateRow(${r.id},'unit',this.value)" /></td>
        <td style="font-weight:600;color:#2b6cb0">${fmt(amount)}</td>
        <td><button class="btn-del" onclick="deleteRow(${r.id})">삭제</button></td>
      `;
      tbody.appendChild(tr);
    });
    calcTotal();
  }

  function updateRow(id, field, val) {
    const r = rows.find(r => r.id === id);
    if (!r) return;
    r[field] = (field === 'qty' || field === 'unit') ? Number(val) : val;
    const amount = (r.qty || 0) * (r.unit || 0);
    // update amount cell
    const tbody = document.getElementById('items-body');
    const trs = tbody.querySelectorAll('tr');
    const idx = rows.indexOf(r);
    if (trs[idx]) {
      trs[idx].cells[7].textContent = fmt(amount);
    }
    calcTotal();
  }

  function calcTotal() {
    const subtotal = rows.reduce((s, r) => s + (r.qty||0)*(r.unit||0), 0);
    const discount = Number(document.getElementById('discount').value) || 0;
    const vat = Math.round((subtotal - discount) * 0.1);
    const total = subtotal - discount + vat;
    document.getElementById('sum-subtotal').textContent = fmt(subtotal) + ' 원';
    document.getElementById('sum-vat').textContent = fmt(vat) + ' 원';
    document.getElementById('sum-total').textContent = fmt(total) + ' 원';
  }

  function fmt(n) {
    return Number(n).toLocaleString('ko-KR');
  }

  function fmtDate(s) {
    if (!s) return '-';
    const [y,m,d] = s.split('-');
    return `${y}년 ${m}월 ${d}일`;
  }

  // ── Generate Preview ──
  function generatePreview() {
    const clientName = document.getElementById('client-name').value || '(미입력)';
    const clientContact = document.getElementById('client-contact').value;
    const clientPhone = document.getElementById('client-phone').value;
    const clientEmail = document.getElementById('client-email').value;
    const clientAddress = document.getElementById('client-address').value;

    const shopName = document.getElementById('shop-name').value || '인쇄소';
    const shopBiz = document.getElementById('shop-biz').value;
    const shopPhone = document.getElementById('shop-phone').value;
    const shopFax = document.getElementById('shop-fax').value;
    const shopAddress = document.getElementById('shop-address').value;

    const quoteNo = document.getElementById('quote-no').value;
    const quoteDate = document.getElementById('quote-date').value;
    const quoteExpiry = document.getElementById('quote-expiry').value;
    const deliveryDate = document.getElementById('delivery-date').value;
    const paymentTerm = document.getElementById('payment-term').value;
    const notes = document.getElementById('notes').value;

    const subtotal = rows.reduce((s, r) => s + (r.qty||0)*(r.unit||0), 0);
    const discount = Number(document.getElementById('discount').value) || 0;
    const vat = Math.round((subtotal - discount) * 0.1);
    const total = subtotal - discount + vat;

    let itemRows = rows.map((r, i) => `
      <tr>
        <td>${i+1}</td>
        <td style="text-align:left">${r.name || '-'}</td>
        <td>${r.spec || '-'}</td>
        <td>${r.paper || '-'}</td>
        <td>${r.color || '-'}</td>
        <td>${fmt(r.qty)}</td>
        <td>${fmt(r.unit)}</td>
        <td style="font-weight:600">${fmt((r.qty||0)*(r.unit||0))}</td>
      </tr>
    `).join('');

    const discountRow = discount > 0 ? `
      <div class="totals-row"><span>할인</span><span style="color:#e53e3e">- ${fmt(discount)} 원</span></div>
    ` : '';

    const notesBlock = notes ? `
      <div class="quote-notes">
        <strong>📝 비고 및 특이사항</strong><br/>
        <pre style="white-space:pre-wrap;font-family:inherit;font-size:0.85rem;margin-top:6px">${notes}</pre>
      </div>
    ` : '';

    document.getElementById('quote-paper').innerHTML = `
      <div class="quote-top">
        <div>
          <div class="quote-title">견 적 서</div>
          <div style="font-size:0.85rem;color:#718096;margin-top:4px">QUOTATION</div>
        </div>
        <div class="quote-no">
          <div><strong>견적번호:</strong> ${quoteNo}</div>
          <div><strong>견적일자:</strong> ${fmtDate(quoteDate)}</div>
          <div><strong>유효기간:</strong> ${fmtDate(quoteExpiry)}</div>
        </div>
      </div>

      <div class="quote-parties">
        <div class="party-box">
          <h4>▸ 공급받는자 (고객)</h4>
          <p><strong>${clientName}</strong></p>
          ${clientContact ? `<p>담당자: ${clientContact}</p>` : ''}
          ${clientPhone ? `<p>연락처: ${clientPhone}</p>` : ''}
          ${clientEmail ? `<p>이메일: ${clientEmail}</p>` : ''}
          ${clientAddress ? `<p>주소: ${clientAddress}</p>` : ''}
        </div>
        <div class="party-box">
          <h4>▸ 공급자 (인쇄소)</h4>
          <p><strong>${shopName}</strong></p>
          ${shopBiz ? `<p>사업자번호: ${shopBiz}</p>` : ''}
          ${shopPhone ? `<p>전화: ${shopPhone}</p>` : ''}
          ${shopFax ? `<p>팩스: ${shopFax}</p>` : ''}
          ${shopAddress ? `<p>주소: ${shopAddress}</p>` : ''}
        </div>
      </div>

      <div style="display:flex;gap:24px;margin-bottom:20px;font-size:0.88rem">
        <div><strong>납기 예정일:</strong> ${fmtDate(deliveryDate)}</div>
        <div><strong>결제 조건:</strong> ${paymentTerm}</div>
      </div>

      <table class="quote-table">
        <thead>
          <tr>
            <th>No.</th>
            <th>품목명</th>
            <th>규격/사양</th>
            <th>용지</th>
            <th>도수</th>
            <th>수량</th>
            <th>단가 (원)</th>
            <th>금액 (원)</th>
          </tr>
        </thead>
        <tbody>${itemRows}</tbody>
      </table>

      <div class="quote-totals">
        <div class="totals-box">
          <div class="totals-row"><span>공급가액 소계</span><span>${fmt(subtotal)} 원</span></div>
          ${discountRow}
          <div class="totals-row"><span>부가세 (VAT 10%)</span><span>${fmt(vat)} 원</span></div>
          <div class="totals-row grand"><span>합계 금액</span><span>${fmt(total)} 원</span></div>
        </div>
      </div>

      ${notesBlock}

      <div class="quote-footer">
        위와 같이 견적서를 제출합니다. 본 견적은 유효기간 내에 유효하며, 이후 변경될 수 있습니다.
      </div>

      <div class="seal-box">
        <div class="seal">
          <p>${fmtDate(quoteDate)}</p>
          <p style="font-size:1rem;font-weight:700;color:#2d3748">${shopName}</p>
          <div style="display:flex;justify-content:flex-end;margin-top:8px">
            <div class="stamp">인(印)</div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('preview-section').style.display = 'block';
    document.getElementById('preview-section').scrollIntoView({ behavior: 'smooth' });
  }

  function hidePreview() {
    document.getElementById('preview-section').style.display = 'none';
    document.getElementById('form-section').scrollIntoView({ behavior: 'smooth' });
  }

  function printQuote() {
    if (document.getElementById('preview-section').style.display === 'none') {
      generatePreview();
      setTimeout(() => window.print(), 400);
    } else {
      window.print();
    }
  }

  function resetForm() {
    if (!confirm('모든 입력 내용을 초기화하시겠습니까?')) return;
    rows = [];
    rowId = 0;
    document.querySelectorAll('input:not([readonly]), textarea, select').forEach(el => {
      if (el.type === 'number') el.value = el.id === 'discount' ? '0' : '';
      else if (el.tagName === 'SELECT') el.selectedIndex = 0;
      else el.value = '';
    });
    document.getElementById('shop-name').value = '소소 인쇄소';
    const today = new Date();
    const fmt2 = d => d.toISOString().split('T')[0];
    document.getElementById('quote-date').value = fmt2(today);
    const exp = new Date(today); exp.setDate(exp.getDate() + 14);
    document.getElementById('quote-expiry').value = fmt2(exp);
    const del = new Date(today); del.setDate(del.getDate() + 7);
    document.getElementById('delivery-date').value = fmt2(del);
    document.getElementById('quote-no').value = 'Q-' + today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0') + '-' + String(Math.floor(Math.random()*900)+100);
    document.getElementById('preview-section').style.display = 'none';
    renderTable();
    addRow();
  }
</script>
</body>
</html>
