<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인쇄소 견적서 시스템</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-logo">🖨️ <span>소소</span> 인쇄소</div>
    <span class="version-badge">v1.0.0</span>
  </div>
  <span class="header-right">Professional Print Quotation</span>
</header>

<div class="container">
  <div id="form-section">

    <div class="page-title">
      <h2>견적서 작성</h2>
      <p>아래 정보를 입력하시면 견적서가 자동으로 완성됩니다</p>
    </div>

    <!-- 고객 / 인쇄소 정보 -->
    <div class="section-grid">
      <div class="card">
        <div class="card-header">
          <div class="card-icon icon-blue">👤</div>
          <h3>고객 정보</h3>
        </div>
        <div class="card-body">
          <div class="grid2">
            <div class="form-group">
              <label>회사명 / 고객명 *</label>
              <input type="text" id="client-name" placeholder="(주)홍길동 / 홍길동" />
            </div>
            <div class="form-group">
              <label>담당자명</label>
              <input type="text" id="client-contact" placeholder="담당자 성함" />
            </div>
          </div>
          <div class="grid2">
            <div class="form-group">
              <label>연락처</label>
              <input type="text" id="client-phone" placeholder="010-0000-0000" />
            </div>
            <div class="form-group">
              <label>이메일</label>
              <input type="email" id="client-email" placeholder="example@email.com" />
            </div>
          </div>
          <div class="form-group">
            <label>주소</label>
            <input type="text" id="client-address" placeholder="고객 주소" />
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-icon icon-purple">🏢</div>
          <h3>인쇄소 정보</h3>
        </div>
        <div class="card-body">
          <div class="grid2">
            <div class="form-group">
              <label>인쇄소명 *</label>
              <input type="text" id="shop-name" value="소소 인쇄소" />
            </div>
            <div class="form-group">
              <label>사업자번호</label>
              <input type="text" id="shop-biz" placeholder="000-00-00000" />
            </div>
          </div>
          <div class="grid2">
            <div class="form-group">
              <label>전화번호</label>
              <input type="text" id="shop-phone" placeholder="02-0000-0000" />
            </div>
            <div class="form-group">
              <label>팩스</label>
              <input type="text" id="shop-fax" placeholder="02-0000-0001" />
            </div>
          </div>
          <div class="form-group">
            <label>주소</label>
            <input type="text" id="shop-address" placeholder="인쇄소 주소" />
          </div>
        </div>
      </div>
    </div>

    <!-- 견적 기본 정보 -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-header">
        <div class="card-icon icon-orange">📋</div>
        <h3>견적 기본 정보</h3>
      </div>
      <div class="card-body">
        <div class="grid3">
          <div class="form-group">
            <label>견적 번호</label>
            <input type="text" id="quote-no" readonly />
          </div>
          <div class="form-group">
            <label>견적 날짜 *</label>
            <input type="date" id="quote-date" />
          </div>
          <div class="form-group">
            <label>유효 기간</label>
            <input type="date" id="quote-expiry" />
          </div>
        </div>
        <div class="grid2" style="margin-top:12px">
          <div class="form-group">
            <label>납기 예정일</label>
            <input type="date" id="delivery-date" />
          </div>
          <div class="form-group">
            <label>결제 조건</label>
            <select id="payment-term">
              <option>현금</option>
              <option>계좌이체</option>
              <option>30일 후 결제</option>
              <option>선불 50% / 완료 후 50%</option>
              <option>완료 후 청구</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- 인쇄 항목 -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-header">
        <div class="card-icon icon-green">📦</div>
        <h3>인쇄 항목</h3>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:40px">No.</th>
                <th style="min-width:150px">인쇄 품목</th>
                <th style="min-width:120px">규격 / 사양</th>
                <th style="min-width:90px">용지</th>
                <th style="min-width:70px">도수</th>
                <th style="min-width:75px">수량</th>
                <th style="min-width:100px">단가 (원)</th>
                <th style="min-width:110px">금액 (원)</th>
                <th style="width:56px">삭제</th>
              </tr>
            </thead>
            <tbody id="items-body"></tbody>
          </table>
        </div>

        <div class="preset-row">
          <button class="btn-preset" onclick="addRow()">＋ 항목 추가</button>
          <button class="btn-preset" onclick="addRow('명함')">명함</button>
          <button class="btn-preset" onclick="addRow('전단지')">전단지</button>
          <button class="btn-preset" onclick="addRow('브로슈어')">브로슈어</button>
          <button class="btn-preset" onclick="addRow('봉투')">봉투</button>
          <button class="btn-preset" onclick="addRow('롤업배너')">롤업배너</button>
          <button class="btn-preset" onclick="addRow('스티커')">스티커</button>
        </div>

        <div class="summary-card">
          <div class="summary-row">
            <span>공급가액 소계</span>
            <strong id="sum-subtotal">0 원</strong>
          </div>
          <div class="summary-row">
            <span>할인</span>
            <div class="discount-inline">
              <input type="number" id="discount" value="0" min="0" oninput="calcTotal()" />
              <span>원</span>
            </div>
          </div>
          <div class="summary-row">
            <span>부가세 (VAT 10%)</span>
            <strong id="sum-vat">0 원</strong>
          </div>
          <div class="summary-row total">
            <span>합계 금액</span>
            <strong id="sum-total">0 원</strong>
          </div>
        </div>
      </div>
    </div>

    <!-- 비고 -->
    <div class="card" style="margin-bottom:14px">
      <div class="card-header">
        <div class="card-icon icon-orange">📝</div>
        <h3>비고 및 특이사항</h3>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label>특이사항 / 요청사항</label>
          <textarea id="notes" placeholder="예) 후가공: 코팅(유광/무광), 박, 형압 등&#10;색상 프로파일: CMYK&#10;교정지 필요 여부"></textarea>
        </div>
      </div>
    </div>

    <div class="main-actions no-print">
      <button class="btn btn-ghost" onclick="resetForm()">↺ 초기화</button>
      <button class="btn btn-primary" onclick="generatePreview()">미리보기</button>
      <button class="btn btn-success" onclick="printQuote()">🖨 인쇄 / PDF</button>
    </div>

  </div><!-- /form-section -->

  <!-- Preview -->
  <div id="preview-section" style="margin-top:24px">
    <div class="preview-actions no-print">
      <button class="btn btn-ghost" onclick="hidePreview()">← 돌아가기</button>
      <button class="btn btn-success" onclick="printQuote()">🖨 인쇄 / PDF</button>
    </div>
    <div class="quote-paper" id="quote-paper"></div>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
